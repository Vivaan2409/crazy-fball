<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — FootballVision AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #06080f;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-indigo: #818cf8;
            --accent-rose: #fb7185;
            --gradient-cta: linear-gradient(135deg, #6366f1, #8b5cf6);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .bg-mesh .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
        }

        .bg-mesh .orb:nth-child(1) {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(251, 113, 133, 0.3), transparent 70%);
            top: -20%; left: -10%;
        }

        .bg-mesh .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2), transparent 70%);
            bottom: -15%; right: -5%;
        }

        .error-container {
            max-width: 480px;
            width: 100%;
            margin: 0 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .error-icon {
            width: 80px; height: 80px;
            margin: 0 auto 1.5rem;
            background: rgba(251, 113, 133, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--accent-rose);
            animation: iconBounce 2s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .error-brand {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .error-container h1 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        .error-container .error-msg {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .video-id {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 0.5rem 0 1.5rem;
            word-break: break-all;
        }

        .error-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.6rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            cursor: pointer;
            font-family: var(--font-body);
        }

        .btn-primary {
            background: var(--gradient-cta);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }
    </style>
</head>
<body>
    <div class="bg-mesh">
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="error-container">
        <div class="error-brand">⚽ FootballVision AI</div>
        <div class="error-icon"><i class="fas fa-triangle-exclamation"></i></div>
        <h1>Something Went Wrong</h1>
        <p class="error-msg">{{ message }}</p>
        {% if video_id %}
        <div class="video-id">ID: {{ video_id }}</div>
        {% endif %}
        <p class="error-hint">Please try again or upload a new video.</p>
        <a href="/" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</body>
</html>
